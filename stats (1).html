<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pick/ban stats — angel devil's pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1f2e;
    --bg2: #1f2535;
    --bg3: #252c3d;
    --bg4: #2d3650;
    --border: #3a4460;
    --border-bright: #4a5880;
    --accent: #5b8dee;
    --accent-glow: rgba(91,141,238,0.15);
    --text: #d8e0f0;
    --text-dim: #8896b3;
    --text-bright: #eef2ff;
    --nm: #6ec6f5;
    --hd: #f5c56e;
    --hr: #f57a6e;
    --dt: #a56ef5;
    --fm: #6ef5b2;
    --tb: #f56ea8;
    --pick: #6ef5b2;
    --ban: #f57a6e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  #bgImage {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    transition: opacity 0s ease;
  }

  .container {
    position: relative;
    z-index: 4;
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { margin-bottom: 48px; }

  .logo-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Cedarville Cursive', cursive;
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--text-bright);
  }

  .version-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid rgba(91,141,238,0.3);
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.1em;
  }

  .subtitle { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 12px; }

  .site-nav {
    display: flex;
    gap: 4px;
    margin-top: 14px;
  }

  .nav-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .nav-link:hover { border-color: var(--border-bright); color: var(--text); }
  .nav-link.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  /* Upload zone */
  .upload-section { margin-bottom: 32px; }

  .search-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: block;
  }

  .upload-zone {
    border: 1px dashed var(--border-bright);
    border-radius: 8px;
    padding: 28px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg2);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--bg3);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .upload-label-main {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 4px;
  }

  .upload-label-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .status-bar {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 8px;
    height: 18px;
    transition: color 0.3s;
  }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error   { color: var(--ban); }
  .status-bar.ok      { color: var(--pick); }

  /* Search */
  .search-section { margin-bottom: 40px; display: none; }
  .search-section.visible { display: block; }

  .search-wrapper { position: relative; max-width: 560px; }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px 12px 44px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text-bright);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .search-input::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--bg3);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .dropdown.open { display: block; }
  .dropdown::-webkit-scrollbar { width: 5px; }
  .dropdown::-webkit-scrollbar-track { background: transparent; }
  .dropdown::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  .dropdown-item {
    padding: 10px 16px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    transition: background 0.1s, color 0.1s;
    border-bottom: 1px solid var(--border);
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.focused { background: var(--bg4); color: var(--text-bright); }

  /* Results */
  .results-view { display: none; animation: fadeUp 0.3s ease; }
  .results-view.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .player-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .player-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .player-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
  }

  .meta-stat { display: flex; align-items: center; gap: 6px; }
  .meta-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .meta-dot.pick { background: var(--pick); }
  .meta-dot.ban  { background: var(--ban); }

  /* Tabs */
  .tabs-row {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active-pick { color: var(--pick); border-bottom-color: var(--pick); }
  .tab-btn.active-ban  { color: var(--ban);  border-bottom-color: var(--ban); }

  .tab-panel { display: none; }
  .tab-panel.visible { display: block; }

  /* Category list */
  .category-list { display: flex; flex-direction: column; gap: 8px; }

  .cat-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 18px;
    transition: border-color 0.15s, background 0.15s;
  }
  .cat-row:hover { border-color: var(--border-bright); background: var(--bg3); }

  .cat-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    width: 52px;
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid;
    text-align: center;
  }

  /* Category pill colors matching parent site */
  .cat-label.nm { color: var(--nm); border-color: var(--nm); background: rgba(110,198,245,0.08); }
  .cat-label.hd { color: var(--hd); border-color: var(--hd); background: rgba(245,197,110,0.08); }
  .cat-label.hr { color: var(--hr); border-color: var(--hr); background: rgba(245,122,110,0.08); }
  .cat-label.dt { color: var(--dt); border-color: var(--dt); background: rgba(165,110,245,0.08); }
  .cat-label.fm { color: var(--fm); border-color: var(--fm); background: rgba(110,245,178,0.08); }
  .cat-label.tb { color: var(--tb); border-color: var(--tb); background: rgba(245,110,168,0.08); }
  .cat-label.other { color: var(--text-dim); border-color: var(--border); background: transparent; }

  .cat-bar-wrap {
    flex: 1;
    height: 5px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
  }

  .cat-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .pick-bar { background: var(--pick); }
  .ban-bar  { background: var(--ban); }

  .cat-count {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 500;
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }
  .pick-count { color: var(--pick); }
  .ban-count  { color: var(--ban); }

  .no-data {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-align: center;
    padding: 48px 24px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    letter-spacing: 0.08em;
  }

  /* Pool divider style separator */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
  }
  .divider-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--border-bright);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="bgImage"></div>
<script>
const BG_IMAGES = [
  'https://files.catbox.moe/4q94vw.png',
  'https://files.catbox.moe/lbpbju.png',
  'https://files.catbox.moe/vaecj7.png',
];
(function() {
  const el = document.getElementById('bgImage');
  const idx = Math.floor(Math.random() * BG_IMAGES.length);
  const src = BG_IMAGES[idx];
  const probe = new Image();
  probe.onload = () => {
    el.style.backgroundImage = `url('${src}')`;
    el.style.opacity = '0.5';
  };
  probe.src = src;
})();
</script>
<div class="container">
  <header>
    <div class="logo-row">
      <h1>angel devil's pool viewer</h1>
      <span class="version-tag">STATS</span>
    </div>
    <p class="subtitle">pick & ban frequency by player</p>
    <nav class="site-nav">
      <a href="index.html" class="nav-link">pool viewer</a>
      <a href="stats.html" class="nav-link active">pick/ban stats</a>
    </nav>
  </header>

  <!-- Upload -->
  <div class="upload-section">
    <label class="search-label">Match Data</label>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".json" />
      <div class="upload-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <span class="upload-label-main" id="uploadMainLabel">Drop JSON file here or click to upload</span>
      <span class="upload-label-sub">exports from discord channel archiver</span>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <!-- Player search -->
  <div class="search-section" id="searchSection">
    <label class="search-label" for="playerSearch">Player Name</label>
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="playerSearch" class="search-input" placeholder="Type to search players..." autocomplete="off" spellcheck="false" />
      <div class="dropdown" id="dropdown"></div>
    </div>
    <div class="status-bar" id="searchStatus"></div>
  </div>

  <!-- Results -->
  <div class="results-view" id="resultsView">
    <div class="player-header">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-meta" id="playerMeta"></div>
    </div>

    <div class="tabs-row">
      <button class="tab-btn active-pick" id="tabPick" onclick="switchTab('pick')">Picks</button>
      <button class="tab-btn" id="tabBan" onclick="switchTab('ban')">Bans</button>
    </div>

    <div class="tab-panel visible" id="panelPick">
      <div class="category-list" id="pickList"></div>
    </div>
    <div class="tab-panel" id="panelBan">
      <div class="category-list" id="banList"></div>
    </div>
  </div>
</div>

<script>
let allData = null;
let allPlayers = [];
let currentTab = 'pick';
let focusedIndex = -1;

const CAT_CLASS = { nm:'nm', hd:'hd', hr:'hr', dt:'dt', fm:'fm', tb:'tb' };

function catClass(cat) {
  const base = cat.replace(/\d.*/, '').toLowerCase();
  return CAT_CLASS[base] || 'other';
}

// ── Upload ────────────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function setStatus(msg, type = '') {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar ' + type;
}

function readFile(file) {
  if (!file.name.endsWith('.json')) return setStatus('File must be a .json', 'error');
  setStatus('Reading file...', 'loading');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const json = JSON.parse(e.target.result);
      processData(json, file.name);
    } catch(err) {
      setStatus('Invalid JSON: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function processData(json, filename) {
  allData = json;
  const text = JSON.stringify(json);

  // Extract all unique player names
  const nameSet = new Set();
  const re = /([A-Za-z0-9_\-\[\] ]+?)'s (?:Pick|Ban):/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const name = m[1].trim();
    if (name.length > 1) nameSet.add(name);
  }

  allPlayers = [...nameSet].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));

  if (allPlayers.length === 0) {
    setStatus('No pick/ban data found in this file.', 'error');
    return;
  }

  document.getElementById('uploadMainLabel').textContent = `✓ ${filename}`;
  setStatus(`Loaded — ${allPlayers.length} players found`, 'ok');
  document.getElementById('searchSection').classList.add('visible');
}

// ── Player search ─────────────────────────────────────────────────────────────
const searchInput = document.getElementById('playerSearch');
const dropdown    = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  focusedIndex = -1;
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { closeDropdown(); return; }
  const matches = allPlayers.filter(p => p.toLowerCase().includes(q)).slice(0, 10);
  renderDropdown(matches);
});

searchInput.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedIndex = Math.min(focusedIndex + 1, items.length - 1);
    updateFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedIndex = Math.max(focusedIndex - 1, -1);
    updateFocus(items);
  } else if (e.key === 'Enter') {
    if (focusedIndex >= 0 && items[focusedIndex]) {
      selectPlayer(items[focusedIndex].dataset.name);
    } else if (searchInput.value.trim()) {
      selectPlayer(searchInput.value.trim());
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

function updateFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === focusedIndex));
}

function renderDropdown(matches) {
  if (!matches.length) { closeDropdown(); return; }
  dropdown.innerHTML = matches.map(p =>
    `<div class="dropdown-item" data-name="${escHtml(p)}">${escHtml(p)}</div>`
  ).join('');
  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('click', () => selectPlayer(el.dataset.name));
  });
  dropdown.classList.add('open');
}

function closeDropdown() { dropdown.classList.remove('open'); dropdown.innerHTML = ''; }

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrapper')) closeDropdown();
});

function selectPlayer(name) {
  searchInput.value = name;
  closeDropdown();
  showStats(name);
}

// ── Stats rendering ───────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function showStats(name) {
  const text = JSON.stringify(allData);
  const pickRe = new RegExp(`${escRe(name)}'s Pick: \\[?([A-Za-z0-9]+)`, 'g');
  const banRe  = new RegExp(`${escRe(name)}'s Ban: ([A-Za-z0-9]+)`, 'g');

  const picks = {}, bans = {};
  let m;
  while ((m = pickRe.exec(text)) !== null) picks[m[1]] = (picks[m[1]] || 0) + 1;
  while ((m = banRe.exec(text)) !== null)  bans[m[1]]  = (bans[m[1]]  || 0) + 1;

  const totalPicks = Object.values(picks).reduce((a,b)=>a+b,0);
  const totalBans  = Object.values(bans).reduce((a,b)=>a+b,0);

  document.getElementById('playerTitle').textContent = name.toUpperCase();
  document.getElementById('playerMeta').innerHTML = `
    <div class="meta-stat"><span class="meta-dot pick"></span>${totalPicks} pick${totalPicks !== 1 ? 's' : ''}</div>
    <div class="meta-stat"><span class="meta-dot ban"></span>${totalBans} ban${totalBans !== 1 ? 's' : ''}</div>
  `;

  renderCatList('pickList', picks, 'pick');
  renderCatList('banList',  bans,  'ban');

  document.getElementById('resultsView').classList.add('visible');
  switchTab(currentTab);
}

function renderCatList(containerId, data, mode) {
  const el = document.getElementById(containerId);
  const entries = Object.entries(data).sort((a,b) => b[1]-a[1]);

  if (!entries.length) {
    el.innerHTML = `<div class="no-data">NO ${mode.toUpperCase()}S FOUND</div>`;
    return;
  }

  const max = entries[0][1];
  const barClass  = mode === 'pick' ? 'pick-bar'  : 'ban-bar';
  const cntClass  = mode === 'pick' ? 'pick-count' : 'ban-count';

  el.innerHTML = entries.map(([cat, count]) => `
    <div class="cat-row">
      <span class="cat-label ${catClass(cat)}">${cat}</span>
      <div class="cat-bar-wrap">
        <div class="cat-bar ${barClass}" style="width:${(count/max)*100}%"></div>
      </div>
      <span class="cat-count ${cntClass}">${count}</span>
    </div>
  `).join('');
}

function switchTab(tab) {
  currentTab = tab;
  const pickBtn = document.getElementById('tabPick');
  const banBtn  = document.getElementById('tabBan');
  const pickPanel = document.getElementById('panelPick');
  const banPanel  = document.getElementById('panelBan');

  pickBtn.className  = 'tab-btn' + (tab === 'pick' ? ' active-pick' : '');
  banBtn.className   = 'tab-btn' + (tab === 'ban'  ? ' active-ban'  : '');
  pickPanel.classList.toggle('visible', tab === 'pick');
  banPanel.classList.toggle('visible',  tab === 'ban');
}
</script>
</body>
</html>
